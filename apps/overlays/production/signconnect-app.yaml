apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-app-signconnect
  namespace: argocd
  labels:
    app.kubernetes.io/name: prod-app-signconnect
    app.kubernetes.io/part-of: applications
spec:
  project: default
  source:
    repoURL: git@github.com:HowDiggy/k8s-gitops.git
    targetRevision: main
    path: apps/overlays/production/signconnect
  destination:
    server: https://kubernetes.default.svc
    namespace: signconnect
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
