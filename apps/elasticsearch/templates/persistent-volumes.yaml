---
# Master Node PVs (on Control Plane nodes)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: elasticsearch-master-pv-cp0
  labels:
    app: elasticsearch
    role: master
    node: control-plane-0
spec:
  capacity:
    storage: 40Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: elasticsearch-master-storage
  local:
    path: /mnt/data/elasticsearch
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - k3s-cp0  # Replace with your actual node name
