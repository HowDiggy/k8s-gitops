apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-ilm-policy
  labels:
    app: elasticsearch
data:
  setup-ilm.sh: |
    #!/bin/bash
    
    # Wait for Elasticsearch to be ready
    until curl -s -k -u elastic:${ELASTIC_PASSWORD} https://elasticsearch-coordinating:9200/_cluster/health | grep -q '"status":"green"'; do
      echo "Waiting for Elasticsearch cluster to be ready..."
      sleep 10
    done
    
    # Create ILM policy for logs
    curl -k -X PUT -u elastic:${ELASTIC_PASSWORD} \
      https://elasticsearch-coordinating:9200/_ilm/policy/logstash-policy \
      -H 'Content-Type: application/json' \
      -d '{
        "policy": {
          "phases": {
            "hot": {
              "min_age": "0ms",
              "actions": {
                "rollover": {
                  "max_size": "50gb",
                  "max_age": "1d"
                },
                "set_priority": {
                  "priority": 100
                }
              }
            },
            "warm": {
              "min_age": "1d",
              "actions": {
                "allocate": {
                  "require": {
                    "temperature": "warm"
                  }
                },
                "shrink": {
                  "number_of_shards": 1
                },
                "forcemerge": {
                  "max_num_segments": 1
                },
                "set_priority": {
                  "priority": 50
                }
              }
            },
            "cold": {
              "min_age": "7d",
              "actions": {
                "freeze": {},
                "set_priority": {
                  "priority": 0
                }
              }
            },
            "delete": {
              "min_age": "30d",
              "actions": {
                "delete": {}
              }
            }
          }
        }
      }'
    
    # Create index template for logs
    curl -k -X PUT -u elastic:${ELASTIC_PASSWORD} \
      https://elasticsearch-coordinating:9200/_index_template/logstash-template \
      -H 'Content-Type: application/json' \
      -d '{
        "index_patterns": ["logstash-*"],
        "template": {
          "settings": {
            "number_of_shards": 3,
            "number_of_replicas": 1,
            "index.lifecycle.name": "logstash-policy",
            "index.lifecycle.rollover_alias": "logstash"
          },
          "mappings": {
            "properties": {
              "@timestamp": { "type": "date" },
              "kubernetes.pod.name": { "type": "keyword" },
              "kubernetes.namespace": { "type": "keyword" },
              "kubernetes.container.name": { "type": "keyword" },
              "message": { "type": "text" }
            }
          }
        }
      }'
    
    echo "ILM policy and index template setup completed."
