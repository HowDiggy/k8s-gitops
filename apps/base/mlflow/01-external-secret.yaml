apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mlflow-secrets
  namespace: mlflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler-backend
    kind: ClusterSecretStore
  target:
    name: mlflow-secrets
    template:
      type: Opaque
  data:
    - secretKey: MLFLOW_DB_PASSWORD
      remoteRef:
        key: MLFLOW_DB_PASSWORD
    - secretKey: MINIO_ROOT_USER
      remoteRef:
        key: MINIO_ROOT_USER
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
        key: MINIO_ROOT_PASSWORD
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mlflow-db-credentials
  namespace: mlflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler-backend
    kind: ClusterSecretStore
  target:
    name: mlflow-db-credentials
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "mlflow_user"
        password: "{{ .MLFLOW_DB_PASSWORD }}"
  data:
    - secretKey: MLFLOW_DB_PASSWORD
      remoteRef:
        key: MLFLOW_DB_PASSWORD
