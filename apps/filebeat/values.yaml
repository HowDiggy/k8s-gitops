filebeat:
  # Deploy as a DaemonSet to collect logs from all nodes
  daemonset:
    enabled: true
  
  # Resource allocation
  resources:
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "300m"
      memory: "500Mi"
  
  # Filebeat configuration
  filebeatConfig:
    filebeat.yml: |
      filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/*.log
        processors:
          - add_kubernetes_metadata:
              host: ${NODE_NAME}
              matchers:
              - logs_path:
                  logs_path: "/var/log/containers/"
      
      filebeat.autodiscover:
        providers:
          - type: kubernetes
            node: ${NODE_NAME}
            hints.enabled: true
            hints.default_config:
              type: container
              paths:
                - /var/log/containers/*${data.kubernetes.container.id}.log
      
      processors:
        - add_cloud_metadata: ~
        - add_host_metadata: ~
        - add_kubernetes_metadata: ~
        - add_docker_metadata: ~
      
      output.logstash:
        hosts: ["logstash:5044"]
        loadbalance: true
      
      logging.level: info
      logging.to_files: true
      logging.files:
        path: /var/log/filebeat
        name: filebeat
        keepfiles: 7
        permissions: 0644
  
  # Required for accessing pod logs
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  
  # Deploy Filebeat to all nodes including control plane
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
  
  # Mount required directories
  extraVolumeMounts:
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
    - name: varlog
      mountPath: /var/log
      readOnly: true
  
  extraVolumes:
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers
    - name: varlog
      hostPath:
        path: /var/log
  
  # Note: no Elasticsearch credentials needed as Filebeat outputs to Logstash
