apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-apps-root
  namespace: argocd
  labels:
    app.kubernetes.io/name: staging-apps-root
    app.kubernetes.io/part-of: applications
spec:
  project: default
  source:
    repoURL: https://github.com/HowDiggy/k8s-gitops.git
    targetRevision: main
    path: apps/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
