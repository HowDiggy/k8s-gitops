apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared-oidc
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/HowDiggy/k8s-gitops.git
    targetRevision: dev
    path: infrastructure/base/cloudflare # Points to where your deployment.yaml lives
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true