apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-infrastructure-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: sealed-secrets
            repoURL: https://bitnami-labs.github.io/sealed-secrets
            chart: sealed-secrets
            version: "2.17.4"
            namespace: kube-system
            syncWave: "-1"

          - name: cnpg-operator
            repoURL: https://cloudnative-pg.github.io/charts
            chart: cloudnative-pg
            version: "0.26.0"
            namespace: cnpg-system
            syncWave: "0"

          - name: kube-prometheus-stack
            repoURL: https://prometheus-community.github.io/helm-charts
            chart: kube-prometheus-stack
            version: "77.14.0"
            namespace: monitoring
            syncWave: "1"
            kpsValuesFile: infrastructure/overlays/development/kps-values.yaml

          - name: nvidia-device-plugin
            repoURL: https://nvidia.github.io/k8s-device-plugin
            chart: nvidia-device-plugin
            version: "0.18.2"
            namespace: kube-system
            helmValues: |
              # 1. Lock to your DGX node
              nodeSelector:
                kubernetes.io/hostname: happy
              
              # 2. Bypass the 'dedicated=gpu' taint so the pod can schedule
              tolerations:
              - key: "dedicated"
                operator: "Equal"
                value: "gpu"
                effect: "NoSchedule"

              # 3. Explicitly set the path (Safe practice)
              devicePlugin:
                kubeletPath: /var/lib/kubelet/device-plugins
                

  template:
    metadata:
      name: '{{ .name }}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .syncWave | default "0" }}'
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      source:
        repoURL: '{{ .repoURL }}'
        chart: '{{ .chart }}'
        targetRevision: '{{ .version }}'
        helm:
          values: |
            {{ .helmValues }}
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [ "CreateNamespace=true", "ServerSideApply=true" ]

  # Patch in helm.valueFiles ONLY for kube-prometheus-stack
  templatePatch: |
    {{- if eq .name "kube-prometheus-stack" }}
    spec:
      source:
        helm:
          values: |
            crds:
              enabled: true

            grafana:
              persistence:
                enabled: false
              admin:
                existingSecret: grafana-admin-credentials
              ingress:
                enabled: true
                ingressClassName: nginx
                hosts:
                  - grafana.sprout.localdomain

            prometheus:
              ingress:
                enabled: true
                ingressClassName: nginx
                hosts:
                  - prometheus.sprout.localdomain

            alertmanager:
              ingress:
                enabled: true
                ingressClassName: nginx
                hosts:
                  - alertmanager.sprout.localdomain

            # disable node-exporter on Docker Desktop
            nodeExporter:
              enabled: true

            # avoid node alerts when node-exporter is off
            defaultRules:
              rules:
                node: true
    {{- end }}

