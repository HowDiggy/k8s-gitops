# infrastructure/base/ingress-nginx/application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # This name will be used by all environments
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://kubernetes.github.io/ingress-nginx
      chart: ingress-nginx
      targetRevision: 4.12.2
      helm:
        valueFiles:
          - $values/infrastructure/base/ingress-nginx/values.yaml
    - repoURL: https://github.com/HowDiggy/k8s-gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx # It will be deployed here
  syncPolicy:
    syncOptions:
    - CreateNamespace=true