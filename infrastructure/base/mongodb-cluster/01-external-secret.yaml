# infrastructure/base/mongodb-cluster/01-external-secret.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mongodb-admin-credentials
  namespace: mongodb
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler-backend
    kind: ClusterSecretStore
  target:
    name: mongodb-admin-credentials
    template:
      type: Opaque
  data:
    - secretKey: password
      remoteRef:
        key: MONGODB_ADMIN_PASSWORD
