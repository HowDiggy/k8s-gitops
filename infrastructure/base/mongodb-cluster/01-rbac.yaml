apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mongodb-database-role
  namespace: mongodb
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mongodb-database-rolebinding
  namespace: mongodb
subjects:
- kind: ServiceAccount
  name: mongodb-database
  namespace: mongodb
roleRef:
  kind: Role
  name: mongodb-database-role
  apiGroup: rbac.authorization.k8s.io
