apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-jaupau-password
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: "accounts.jaupau.password"
      remoteRef:
        key: ARGOCD_JAUPAU_PASSWORD_HASH
