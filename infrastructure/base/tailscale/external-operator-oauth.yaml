apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: operator-oauth
  namespace: tailscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler-backend
    kind: ClusterSecretStore
  target:
    name: operator-oauth
  data:
    - secretKey: client_id
      remoteRef:
        key: TAILSCALE_OAUTH_CLIENT_ID
    - secretKey: client_secret
      remoteRef:
        key: TAILSCALE_OAUTH_CLIENT_SECRET
