apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-operator
  namespace: argocd
  labels:
    app.kubernetes.io/name: tailscale-operator
    app.kubernetes.io/part-of: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "-2" # Deploy early so networking is established
spec:
  project: default
  source:
    repoURL: https://pkgs.tailscale.com/helmcharts
    chart: tailscale-operator
    targetRevision: 1.80.3 # Use a stable version
    helm:
      values: |
        oauth:
          clientId: ""
          clientSecret: ""
        env:
          - name: TS_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: operator-oauth
                key: client_id
          - name: TS_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: operator-oauth
                key: client_secret
        operatorConfig:
          # Expose the API server to the Tailnet
          exposeAPIServer: true
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true