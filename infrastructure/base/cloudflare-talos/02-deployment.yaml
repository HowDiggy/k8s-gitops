apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-talos
  namespace: cloudflare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared-talos
  template:
    metadata:
      labels:
        app: cloudflared-talos
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        args: ["tunnel", "--no-autoupdate", "run"]
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflared-talos-token
              key: token
