apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflared-talos-token
  namespace: cloudflare
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-backend
  target:
    name: cloudflared-talos-token
    creationPolicy: Owner
  data:
  - secretKey: token
    remoteRef:
      key: CLOUDFLARE_TUNNEL_TOKEN
