      chart: ingress-nginx
      targetRevision: 4.12.2
      helm:
        valueFiles:
          - $values/infrastructure/overlays/production/ingress-nginx-values.yaml
    - repoURL: https://github.com/HowDiggy/k8s-gitops.git
      targetRevision: HEAD
      ref: values