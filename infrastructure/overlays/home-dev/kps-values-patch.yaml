apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  source:
    helm:
      values: |
        crds:
          enabled: true

        grafana:
          persistence:
            enabled: false
          admin:
            existingSecret: grafana-admin-credentials
          ingress:
            enabled: false

        prometheus:
          ingress:
            enabled: false

        alertmanager:
          ingress:
            enabled: false

        nodeExporter:
          enabled: true

        defaultRules:
          rules:
            node: true

