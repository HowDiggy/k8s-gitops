# Self-contained overlay: all resources live in this dir so Kustomize
# (run with build root infrastructure/overlays/home-dev) does not reference paths outside it.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - sealed-secrets.yaml
  - sealed-grafana-secret.yaml 
  - cnpg-operator.yaml
  - kube-prometheus-stack.yaml
  - nvidia-device-plugin.yaml

patches:
  - path: kps-values-patch.yaml
    target:
      kind: Application
      name: kube-prometheus-stack
      namespace: argocd

