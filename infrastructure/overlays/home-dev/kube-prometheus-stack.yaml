apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-dev-kube-prometheus-stack
  namespace: argocd
  labels:
    app.kubernetes.io/name: home-dev-kube-prometheus-stack
    app.kubernetes.io/part-of: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "77.14.0"
      helm:
        valueFiles:
          - $values/infrastructure/overlays/home-dev/kps-values.yaml
    - repoURL: https://github.com/HowDiggy/k8s-gitops.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/HowDiggy/k8s-gitops.git
      targetRevision: HEAD
      path: infrastructure/base/monitoring
  destination:
    server: https://talos-api.paulojauregui.com
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
