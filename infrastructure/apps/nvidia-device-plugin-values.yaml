# 0. NUKE the default affinity (This is the fix!)
affinity: null

# 1. Lock to your DGX node
nodeSelector:
  kubernetes.io/hostname: happy

# 2. Bypass the 'dedicated=gpu' taint so the pod can schedule
tolerations:
- key: "dedicated"
  operator: "Equal"
  value: "gpu"
  effect: "NoSchedule"

# 3. Explicitly set the path (Safe practice)
devicePlugin:
  kubeletPath: /var/lib/kubelet/device-plugins

runtimeclassName: nvidia

env:
  - name: NVIDIA_VISIBLE_DEVICES
    value: all
  - name: NVIDIA_DRIVER_CAPABILITIES
    value: all
